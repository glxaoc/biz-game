<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Пиксельный офис</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;width:100%;background:#0c0f14;color:#e7edf6;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
    #app{position:fixed;inset:0}
    #game{position:absolute;inset:0;width:100%;height:100%}
    #game canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
  </style>
</head>
<body>
  <div id="app">
    <div id="game"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
