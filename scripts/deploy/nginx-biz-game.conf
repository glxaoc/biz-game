# biz-game dashboard — ОТДЕЛЬНЫЙ сайт. НЕ перезаписывает конфиг бота/CRM.
# Положить в /etc/nginx/sites-available/biz-game, поправить server_name и root,
# затем: ln -s ../sites-available/biz-game /etc/nginx/sites-enabled/ ; nginx -t ; systemctl reload nginx
#
# Вариант на отдельном порту (просто и безопасно — не конфликтует с 80/443 бота):
server {
    # 127.0.0.1 only — дашборд с именами сотрудников и финансами НЕ торчит в интернет.
    # Доступ через SSH-туннель: ssh -L 8088:localhost:8088 YOUR_SERVER  →  http://localhost:8088
    listen 127.0.0.1:8088;
    server_name _;
    root /opt/biz-game/app/dist;   # ЗАМЕНИ на реальный путь (вывод deploy.sh)
    index index.html;

    # SPA + статика
    location / { try_files $uri $uri/ /index.html; }

    # снапшот не кэшируем (обновляется кроном/таймером)
    location = /assets/data/real.json {
        add_header Cache-Control "no-store";
    }
}
# Тогда дашборд открывается на http://<IP>:8088/  (бот на 80/443 не затронут).
# Если нужен поддомен (dashboard.example.ru) на 443 — добавь отдельный server{} с TLS,
# тоже НЕ трогая существующие блоки.
